<!doctype html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Lyrics - NVNP Music</title>
    <link rel="stylesheet" href="../style/styleDashBoard.css" />
    <link rel="stylesheet" href="../style/styleLyrics.css" />
  </head>
  <body>
    <div class="lyrics-page">
      <div class="lyrics-shell">
        <div class="lyrics-topbar">
          <button class="back-btn" type="button" onclick="closeLyricsPage()">
            <i class="bi bi-chevron-left"></i>
            Thu nho
          </button>
          <div class="lyrics-badge">Micro Live</div>
        </div>

        <section class="lyrics-stage">
          <aside class="lyrics-sidebar">
            <div class="lyrics-cover-wrap">
              <img id="lyrics-cover" class="lyrics-cover" src="" alt="Cover" />
            </div>
            <div class="lyrics-meta">
              <p class="lyrics-kicker">Dang phat</p>
              <h1 id="lyrics-title" class="lyrics-title">
                Chua co bai hat nao
              </h1>
              <p id="lyrics-artist" class="lyrics-artist">
                Hay chon 1 bai hat tren player
              </p>
              <div class="lyrics-subline" id="lyrics-subline"></div>
            </div>
            <div class="lyrics-status-row">
              <span id="lyrics-source" class="panel-source">Tu dong tai</span>
              <span id="lyrics-progress-label" class="lyrics-progress-label"
                >00:00 / 00:00</span
              >
            </div>
          </aside>

          <section class="lyrics-panel">
            <div id="lyrics-content" class="lyrics-content">
              <div class="empty-state">
                <p>Chua co du lieu loi cho bai hat nay.</p>
                <p>Hay thu mo mot bai hat khac hoac cap nhat lyric tren API.</p>
              </div>
            </div>
          </section>
        </section>
      </div>
    </div>

    <script src="../javascript/jsLyrics.js"></script>
  </body>
</html>
