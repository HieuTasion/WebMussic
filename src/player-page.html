<!doctype html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Player - NVNP Music</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css"
    />
    <style>
      :root {
        --teal: #2dd4bf;
        --bg: #0f1717;
        --surface: #141d1d;
        --surface-hover: #1b2727;
        --border: rgba(255, 255, 255, 0.08);
        --text-soft: #8ea3a3;
      }

      body {
        margin: 0;
        background:
          radial-gradient(circle at top, rgba(45, 212, 191, 0.18), transparent 30%),
          linear-gradient(180deg, #091010 0%, #0f1717 100%);
        color: #e2e8f0;
        font-family: "Segoe UI", sans-serif;
        padding-bottom: 120px;
      }

      .player-page {
        padding: 24px 20px 120px;
      }

      .back-btn {
        display: inline-flex;
        align-items: center;
        gap: 8px;
        border: 1px solid var(--border);
        background: rgba(20, 29, 29, 0.92);
        color: #e2e8f0;
        padding: 10px 18px;
        border-radius: 999px;
        cursor: pointer;
        transition: 0.25s ease;
      }

      .back-btn:hover {
        background: var(--teal);
        color: #0f1717;
      }

      .album-shell {
        max-width: 1100px;
        margin: 18px auto 0;
      }

      .album-header {
        display: grid;
        grid-template-columns: 220px 1fr auto;
        gap: 28px;
        align-items: end;
        padding: 28px;
        border-radius: 28px;
        background: linear-gradient(135deg, rgba(20, 29, 29, 0.98), rgba(12, 18, 18, 0.94));
        border: 1px solid var(--border);
        box-shadow: 0 20px 50px rgba(0, 0, 0, 0.28);
      }

      .album-img {
        width: 220px;
        height: 220px;
        object-fit: cover;
        border-radius: 24px;
        box-shadow: 0 18px 40px rgba(0, 0, 0, 0.38);
      }

      .album-meta {
        min-width: 0;
      }

      .album-kicker {
        margin: 0 0 10px;
        font-size: 0.78rem;
        letter-spacing: 0.24em;
        color: var(--teal);
        text-transform: uppercase;
      }

      .album-title {
        margin: 0;
        font-size: clamp(2.2rem, 4vw, 4.4rem);
        line-height: 1.02;
        font-weight: 900;
      }

      .album-artist {
        display: none;
      }

      .play-btn-large {
        width: 82px;
        height: 82px;
        border: none;
        border-radius: 50%;
        background: var(--teal);
        color: #0f1717;
        font-size: 2rem;
        box-shadow: 0 14px 30px rgba(45, 212, 191, 0.3);
        transition: transform 0.25s ease, box-shadow 0.25s ease;
      }

      .play-btn-large:hover {
        transform: scale(1.06);
        box-shadow: 0 18px 34px rgba(45, 212, 191, 0.42);
      }

      .song-list {
        margin-top: 24px;
        border-radius: 24px;
        overflow: hidden;
        background: rgba(20, 29, 29, 0.92);
        border: 1px solid var(--border);
      }

      .song-item {
        display: grid;
        grid-template-columns: 44px 56px minmax(0, 1fr) auto;
        align-items: center;
        gap: 16px;
        padding: 16px 20px;
        border-bottom: 1px solid var(--border);
        cursor: pointer;
        transition: background 0.25s ease, transform 0.25s ease;
      }

      .song-item:hover {
        background: var(--surface-hover);
        transform: translateX(4px);
      }

      .song-item:last-child {
        border-bottom: none;
      }

      .song-number {
        color: var(--text-soft);
        font-weight: 700;
        text-align: center;
      }

      .song-img {
        width: 56px;
        height: 56px;
        border-radius: 14px;
        object-fit: cover;
      }

      .song-info {
        min-width: 0;
      }

      .song-title {
        margin: 0;
        color: #f8fafc;
        font-weight: 700;
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
      }

      .song-artist {
        margin: 4px 0 0;
        color: var(--text-soft);
        font-size: 0.92rem;
      }

      .song-lyrics {
        margin: 6px 0 0;
        color: #c2d8d8;
        font-size: 0.88rem;
        line-height: 1.5;
        display: -webkit-box;
       
        -webkit-box-orient: vertical;
        overflow: hidden;
      }

      .song-duration {
        color: var(--text-soft);
        font-size: 0.92rem;
        white-space: nowrap;
      }

      @media (max-width: 768px) {
        .player-page {
          padding: 16px 14px 120px;
        }

        .album-header {
          grid-template-columns: 1fr;
          justify-items: center;
          text-align: center;
          padding: 24px 18px;
        }

        .album-img {
          width: min(72vw, 240px);
          height: min(72vw, 240px);
        }

        .song-item {
          grid-template-columns: 34px 52px minmax(0, 1fr);
          gap: 12px;
        }

        .song-duration {
          display: none;
        }

       
      }
    </style>
  </head>
  <body>
    <div class="player-page">
      <button class="back-btn" onclick="loadPage('Home.html')">
        <i class="bi bi-chevron-left"></i>
        Quay lại
      </button>

      <div class="album-shell">
        <div class="album-header" id="album-header">
          <img src="" alt="Album" class="album-img" id="album-img" />
          <div class="album-meta">
            <p class="album-kicker">Album</p>
            <h1 class="album-title" id="album-title">Loading...</h1>
            <p class="album-artist" id="album-artist"></p>
          </div>
          <button class="play-btn-large" id="play-all-btn" aria-label="Phat album">
            <i class="bi bi-play-fill"></i>
          </button>
        </div>

        <div class="song-list">
          <div id="song-list" class="song-items"></div>
        </div>
      </div>
    </div>
  </body>
</html>
