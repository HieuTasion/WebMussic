<!doctype html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Danh sách tài khoản | Harmonix</title>
    <link rel="stylesheet" href="../style/auth.css" />
    <script src="../javascript/auth.js" defer></script>
  </head>
  <body data-page="users">
    <main class="auth-shell auth-shell-wide">
      <section class="auth-hero auth-hero-list">
        <div class="brand-badge">Admin</div>
        <h1>Danh sách tài khoản đã đăng ký</h1>
        <p>
          Trang này chỉ dành cho admin và hiển thị dữ liệu người dùng lấy trực
          tiếp từ API.
        </p>
        <div class="hero-stats">
          <div><strong id="registered-count">0</strong><span>tài khoản</span></div>
          <div><strong id="last-updated">--</strong><span>cập nhật cuối</span></div>
        </div>
        <div class="hero-links">
          <a class="ghost-link" href="DashBoard.html">Về dashboard</a>
          <a class="ghost-link" href="profile.html">Mở hồ sơ</a>
        </div>
      </section>

      <section class="auth-card auth-card-wide">
        <div class="card-top">
          <div>
            <p class="section-tag">Admin View</p>
            <h2>Danh sách người đăng ký</h2>
          </div>
          <button class="text-link button-reset" id="clear-users" type="button">
            Tải lại
          </button>
        </div>

        <div id="users-empty" class="empty-state">
          Chưa có tài khoản nào được đăng ký.
        </div>
        <div id="users-list" class="users-grid"></div>
      </section>
    </main>
  </body>
</html>
