<!doctype html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>NVNP Music</title>
    <base href="/ThietKeWebDoAn4/" />
    <link rel="stylesheet" href="/style/auth.css" />
    <script src="javascript/auth.js" defer></script>
  </head>
  <body data-page="login">
    <main class="auth-layout">
      <section class="auth-showcase">
        <div class="showcase-top">
          <a class="brand-mark" href="src/Home.html">NVNP Music</a>
          <a class="mini-link" href="src/register.html">Tạo tài khoản</a>
        </div>

        <div class="showcase-copy">
          <p class="section-tag">Music Platform</p>
          <h1>Đăng nhập để nghe nhạc theo gu của bạn</h1>
          <p class="showcase-text">
            Giao diện được làm theo tinh thần NhacCuaTui: tối, nổi bật và tập
            trung vào trải nghiệm nghe nhạc.
          </p>
        </div>
      </section>

      <section class="auth-panel">
        <div class="panel-head">
          <p class="section-tag">Đăng nhập</p>
          <h2>Chào mừng quay lại</h2>
          <p class="panel-text">
            Nhập email và mật khẩu để vào tài khoản của bạn.
          </p>
        </div>

        <form id="login-form" class="auth-form" novalidate>
          <label class="field">
            <span>Tên hoặc Email</span>
            <input
              type="text"
              id="login-email"
              placeholder="Nhập tên hoặc email"
              autocomplete="email"
              required
            />
          </label>

          <label class="field">
            <span>Mật khẩu</span>
            <input
              type="password"
              id="login-password"
              placeholder="Nhập mật khẩu"
              autocomplete="current-password"
              required
            />
          </label>

          <button type="submit" class="primary-btn">Đăng nhập</button>
          <p class="form-note" id="login-message"></p>
        </form>

        <div class="panel-foot">
          <span>Chưa có tài khoản?</span>
          <a class="accent-link" href="src/register.html">Đăng ký ngay</a>
        </div>
      </section>
    </main>
  </body>
</html>
